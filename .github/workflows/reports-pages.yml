# Build a static “reports” site (pytest counts + security section) and deploy to GitHub Pages.
# Repo settings → Pages → Source: GitHub Actions (first run may prompt to enable).
name: Reports site (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies and report tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit

      - name: Run pytest (JUnit XML)
        env:
          MOCK_LLM: "1"
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=junit.xml
          python -m pytest tests/ -m security -v --tb=short --junitxml=security-junit.xml

      - name: Security scans (Bandit, pip-audit)
        run: |
          bandit -r app -f json -o bandit.json -q || true
          pip-audit -f json -o pip_audit.json || true

      - name: Generate Pages site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/generate_reports_page.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
