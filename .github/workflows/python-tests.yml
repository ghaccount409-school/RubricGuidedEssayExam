# Project standard: pytest (see tests/ and pytest.ini).
# unittest is not used; plain assert + fixtures + TestClient fit FastAPI well.
name: Python tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      pytest_args:
        description: "Extra pytest arguments (e.g. tests/test_api.py::test_home -k mock)"
        required: false
        default: ""
        type: string

concurrency:
  group: python-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (CI — push / pull_request)
        if: github.event_name != 'workflow_dispatch'
        env:
          MOCK_LLM: "1"
          DATABASE_URL: "sqlite:///:memory:"
        run: python -m pytest tests/ -v --tb=short

      - name: Run pytest (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          MOCK_LLM: "1"
          DATABASE_URL: "sqlite:///:memory:"
        run: python -m pytest tests/ -v --tb=short ${{ inputs.pytest_args }}
