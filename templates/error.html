{% extends "base.html" %}
{% block title %}Something went wrong{% endblock %}
{% block body %}
<section class="hero hero-compact">
  <h1 class="hero-title">We hit a temporary issue</h1>
  <p class="hero-lead muted">Your progress is safe. Please try again, or return to the home page.</p>
</section>

<div class="panel panel-error">
  <p class="error-text">{{ message }}</p>
  <p class="next-action" style="margin-top:1.25rem;">
    <a href="/" class="btn btn-primary">← Back to home</a>
  </p>
</div>
{% endblock %}
