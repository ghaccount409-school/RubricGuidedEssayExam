{% extends "base.html" %}
{% block title %}Instructor sign-in{% endblock %}
{% block body %}
<section class="hero">
  <h1 class="hero-title">Instructor access</h1>
  <p class="hero-lead">Sign in to view sessions and grading detail.</p>
</section>

<form class="panel form-card" method="post" action="/professor/login" autocomplete="off">
  <h2 class="panel-title">Credentials</h2>
  {% if error %}
  <p class="error-text" role="alert">{{ error }}</p>
  {% endif %}
  <input type="hidden" name="next" value="{{ next }}">

  <div class="form-grid">
    <div class="field field-span-2">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" maxlength="256">
    </div>
    <div class="field field-span-2">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" maxlength="256">
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Sign in</button>
  </div>
</form>
{% endblock %}
