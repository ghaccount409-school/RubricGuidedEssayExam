{% extends "base.html" %}
{% block wrap_modifier %} wrap--home{% endblock %}
{% block title %}Home{% endblock %}
{% block body %}
<div class="home-centered">
  <section class="hero home-hero">
    <h1 class="hero-title">Rubric-Guided Essay Exams</h1>
    <p class="hero-lead">
      Choose how you want to continue: start a new exam session or resume one that is still in progress.
    </p>
  </section>

  <nav class="home-nav-actions" aria-label="Start or resume an exam">
    <div class="form-actions home-actions">
      <a href="/start" class="btn btn-primary">Start exam</a>
      <a href="/resume" class="btn btn-secondary">Resume exam</a>
    </div>
  </nav>
</div>
{% endblock %}
