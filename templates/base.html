<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RGEE{% endblock %} · Rubric-Guided Essay Exam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page-bg" aria-hidden="true"></div>
  <div class="wrap{% block wrap_modifier %}{% endblock %}">
    <header class="site-header">
      <div class="brand-block">
        <a href="/" class="logo">RGEE</a>
        <span class="tagline">Rubric-guided essay exams</span>
      </div>
      <nav class="main-nav" aria-label="Main">
        <a href="/" class="nav-link{% if request.url.path == '/' %} is-active{% endif %}">Home</a>
        <a href="/professor" class="nav-link{% if request.url.path.startswith('/professor') %} is-active{% endif %}">Instructor</a>
        <a href="/performance-log" class="nav-link{% if request.url.path.startswith('/performance-log') %} is-active{% endif %}">Performance log</a>
      </nav>
    </header>

    <main id="main" class="main">
      {% block body %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>Modular oral-style exam system · Mock LLM supported for local demos</p>
    </footer>
  </div>
  <div class="a11y-menu" data-a11y-menu>
    <button
      type="button"
      class="a11y-fab"
      data-a11y-toggle
      aria-expanded="false"
      aria-controls="a11y-panel"
      aria-label="Open accessibility options"
      title="Accessibility options"
    >
      <span class="a11y-fab-icon" aria-hidden="true">♿</span>
    </button>
    <section
      id="a11y-panel"
      class="a11y-panel"
      data-a11y-panel
      role="dialog"
      aria-label="Accessibility features"
      hidden
    >
      <h2 class="a11y-panel-title">Accessibility</h2>
      <p class="a11y-panel-subtitle">Cursor visibility</p>
      <div class="a11y-cursor-options" role="group" aria-label="Big cursor options">
        <button type="button" class="a11y-option" data-cursor-choice="black">
          <span class="a11y-option-preview a11y-option-preview-black" aria-hidden="true"></span>
          <span class="a11y-option-label">Big Black Cursor</span>
        </button>
        <button type="button" class="a11y-option" data-cursor-choice="white">
          <span class="a11y-option-preview a11y-option-preview-white" aria-hidden="true"></span>
          <span class="a11y-option-label">Big White Cursor</span>
        </button>
      </div>
      <div class="a11y-feature-section">
        <p class="a11y-panel-subtitle">ADHD Focus Highlighter</p>
        <button type="button" class="a11y-option a11y-focus-option" data-adhd-focus-toggle aria-pressed="false">
          <span class="a11y-option-label">Enable Focus Highlighter</span>
        </button>
      </div>
    </section>
  </div>
  <div class="a11y-focus-overlay" data-a11y-focus-overlay aria-hidden="true"></div>
  <script>
    (function () {
      var cursorStorageKey = "rgee_a11y_cursor_choice";
      var focusStorageKey = "rgee_a11y_focus_enabled";
      var body = document.body;
      var docEl = document.documentElement;
      var menuRoot = document.querySelector("[data-a11y-menu]");
      if (!menuRoot) return;

      var toggle = menuRoot.querySelector("[data-a11y-toggle]");
      var panel = menuRoot.querySelector("[data-a11y-panel]");
      var optionButtons = Array.prototype.slice.call(menuRoot.querySelectorAll("[data-cursor-choice]"));
      var focusToggle = menuRoot.querySelector("[data-adhd-focus-toggle]");
      var focusY = window.innerHeight / 2;
      if (!toggle || !panel || optionButtons.length === 0) return;

      function applyCursor(choice) {
        body.classList.remove("a11y-cursor-black", "a11y-cursor-white");
        if (choice === "black") body.classList.add("a11y-cursor-black");
        if (choice === "white") body.classList.add("a11y-cursor-white");
        optionButtons.forEach(function (button) {
          var selected = button.getAttribute("data-cursor-choice") === choice;
          button.setAttribute("aria-pressed", selected ? "true" : "false");
        });
      }

      function closePanel() {
        panel.hidden = true;
        toggle.setAttribute("aria-expanded", "false");
      }

      function openPanel() {
        panel.hidden = false;
        toggle.setAttribute("aria-expanded", "true");
      }

      function readStoredChoice() {
        try {
          return localStorage.getItem(cursorStorageKey);
        } catch (err) {
          return null;
        }
      }

      function storeChoice(choice) {
        try {
          localStorage.setItem(cursorStorageKey, choice || "");
        } catch (err) {
          // Ignore storage failures (private mode, disabled storage, etc).
        }
      }

      function readStoredFocusEnabled() {
        try {
          return localStorage.getItem(focusStorageKey) === "1";
        } catch (err) {
          return false;
        }
      }

      function storeFocusEnabled(enabled) {
        try {
          localStorage.setItem(focusStorageKey, enabled ? "1" : "0");
        } catch (err) {
          // Ignore storage failures (private mode, disabled storage, etc).
        }
      }

      function setFocusY(y) {
        var viewportHeight = window.innerHeight || 0;
        var clamped = Math.max(0, Math.min(viewportHeight, y || 0));
        focusY = clamped;
        docEl.style.setProperty("--a11y-focus-y", Math.round(clamped) + "px");
      }

      function setFocusEnabled(enabled) {
        body.classList.toggle("a11y-focus-enabled", enabled);
        if (focusToggle) {
          focusToggle.setAttribute("aria-pressed", enabled ? "true" : "false");
          focusToggle.querySelector(".a11y-option-label").textContent = enabled
            ? "Disable Focus Highlighter"
            : "Enable Focus Highlighter";
        }
        storeFocusEnabled(enabled);
      }

      toggle.addEventListener("click", function () {
        if (panel.hidden) openPanel();
        else closePanel();
      });

      optionButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          var selectedChoice = button.getAttribute("data-cursor-choice");
          var currentlyActive = body.classList.contains("a11y-cursor-" + selectedChoice);
          if (currentlyActive) {
            applyCursor("");
            storeChoice("");
          } else {
            applyCursor(selectedChoice);
            storeChoice(selectedChoice);
          }
        });
      });

      if (focusToggle) {
        focusToggle.addEventListener("click", function () {
          var enable = !body.classList.contains("a11y-focus-enabled");
          setFocusEnabled(enable);
        });
      }

      document.addEventListener("pointermove", function (event) {
        if (!body.classList.contains("a11y-focus-enabled")) return;
        setFocusY(event.clientY);
      });

      document.addEventListener("focusin", function (event) {
        if (!body.classList.contains("a11y-focus-enabled")) return;
        if (!event.target || !event.target.getBoundingClientRect) return;
        var rect = event.target.getBoundingClientRect();
        setFocusY(rect.top + rect.height / 2);
      });

      window.addEventListener("resize", function () {
        setFocusY(focusY);
      });

      document.addEventListener("click", function (event) {
        if (panel.hidden) return;
        if (!menuRoot.contains(event.target)) closePanel();
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closePanel();
      });

      // Prevent native select dropdown flicker when Enter is held down.
      document.addEventListener("keydown", function (event) {
        if (event.key !== "Enter" || !event.repeat) return;
        var target = event.target;
        if (!target || target.tagName !== "SELECT") return;
        event.preventDefault();
      });

      setFocusY(window.innerHeight / 2);
      applyCursor(readStoredChoice() || "");
      setFocusEnabled(readStoredFocusEnabled());
    })();
  </script>
</body>
</html>
