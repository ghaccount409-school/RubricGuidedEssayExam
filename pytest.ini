# Tests: pytest (recommended for this FastAPI app). Write files as tests/test_*.py
# with test_* functions or Test* classes; use fixtures in conftest.py.
[pytest]
testpaths = tests
pythonpath = .
markers =
    unit: fast isolated tests (no HTTP client)
    integration: HTTP/API tests against the app
filterwarnings =
    ignore::DeprecationWarning
