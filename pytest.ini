# Layout: tests/general/ (unit + API), tests/security/. Fixtures: tests/conftest.py.
[pytest]
testpaths = tests
pythonpath = .
markers =
    unit: fast isolated tests (no HTTP client)
    integration: HTTP/API tests against the app
    security: tests under tests/security/ (safe errors, HTTP hardening)
filterwarnings =
    ignore::DeprecationWarning
